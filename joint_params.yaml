    limits_deg: { x: [-5, 10], y: [-30, 5], z: [-5, 5] }
    stiffness: 0
    damping: 0.2

  L_Index2:
    # No ref; reasonable PIP: flexion 0–100°, small lateral.
    limits_deg: { x: [-5, 5], y: [-5, 5], z: [-100, 5] }
