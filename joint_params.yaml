# Unified Joint Parameters — one block per joint, all properties together.
# Simulation joint order = order of keys under "joints" (top-to-bottom).
#
# SOURCES:
#   - robot.xml (SMPLSim): primary. limits_deg from joint range="low high", damping = joint damping / 4.
#   - Fingers: no reference in robot (has L_Hand/R_Hand 3-dof only); limits set to reasonable anatomical ranges.

# ============================================================================
# PER-JOINT PARAMETERS (limits in degrees, stiffness, damping)
# ============================================================================

joints:
  Pelvis:
    # robot: freejoint, no limits/damping.
    limits_deg: { x: [-180, 180], y: [-180, 180], z: [-180, 180] }
    stiffness: 0
    damping: 0

  L_Hip:
    # robot.xml limits; damping 15,10,10 → /4 = 3.75,2.5,2.5 (use max 3.75).
    limits_deg: { x: [-160, 22.92], y: [-70, 70], z: [-28.65, 90] }
    stiffness: 0
    damping: 3.75

  R_Hip:
    # robot.xml limits; damping /4 → 3.75.
    limits_deg: { x: [-160, 22.92], y: [-70, 70], z: [-90, 28.65] }
    stiffness: 0
    damping: 3.75

  Torso:
    # robot.xml limits; damping 15,20,20 → /4 = 5.
    limits_deg: { x: [-25.78, 57.3], y: [-34.38, 34.38], z: [-34.38, 34.38] }
    stiffness: 0
    damping: 5

  L_Knee:
    # robot.xml limits; damping 8 → /4 = 2.
    limits_deg: { x: [-5.16, 171.89], y: [-4.58, 6.88], z: [-6.88, 4.58] }
    stiffness: 0
    damping: 2

  R_Knee:
    # robot.xml limits; damping /4 = 2.
    limits_deg: { x: [-5.16, 171.89], y: [-6.88, 4.58], z: [-4.58, 6.88] }
    stiffness: 0
    damping: 2

  Spine:
    # robot.xml limits; damping 15,8,12 → /4 → 3.75,2,3 (use 3).
    limits_deg: { x: [-25.78, 57.3], y: [-34.38, 34.38], z: [-34.38, 34.38] }
    stiffness: 0
    damping: 3

  L_Ankle:
    # robot.xml limits; damping 6,3,6 → /4 → 1.5,0.75,1.5 (use 1.5).
    limits_deg: { x: [-45.84, 45.84], y: [-74.48, 22.92], z: [-4.58, 4.58] }
    stiffness: 0
    damping: 1.5

  R_Ankle:
    # robot.xml limits; damping /4 = 1.5.
    limits_deg: { x: [-45.84, 45.84], y: [-22.92, 74.48], z: [-4.58, 4.58] }
    stiffness: 0
    damping: 1.5

  Chest:
    # robot.xml limits; damping 15,8,12 → /4 = 3.
    limits_deg: { x: [-25.78, 57.3], y: [-34.38, 34.38], z: [-34.38, 34.38] }
    stiffness: 0
    damping: 3

  L_Toe:
    # robot.xml limits; no damping in robot → use 0.25.
    limits_deg: { x: [-91.67, 22.92], y: [-4.58, 4.58], z: [-4.58, 4.58] }
    stiffness: 0
    damping: 0.25

  R_Toe:
    # robot.xml limits; no damping in robot → use 0.25.
    limits_deg: { x: [-91.67, 22.92], y: [-4.58, 4.58], z: [-4.58, 4.58] }
    stiffness: 0
    damping: 0.25

  Neck:
    # robot.xml limits; damping 10 → /4 = 2.5.
    limits_deg: { x: [-28.65, 57.3], y: [-40.11, 40.11], z: [-40.11, 40.11] }
    stiffness: 0
    damping: 2.5

  L_Thorax:
    # robot.xml limits; damping 20 → /4 = 5.
    limits_deg: { x: [-10.89, 4.58], y: [-28.65, 17.19], z: [-31.51, 40.11] }
    stiffness: 0
    damping: 5

  R_Thorax:
    # robot.xml limits; damping /4 = 5.
    limits_deg: { x: [-10.89, 4.58], y: [-17.19, 28.65], z: [-40.11, 31.51] }
    stiffness: 0
    damping: 5

  Head:
    # robot.xml limits; damping 2 → /4 = 0.5.
    limits_deg: { x: [-28.65, 57.3], y: [-40.11, 40.11], z: [-40.11, 40.11] }
    stiffness: 0
    damping: 0.5

  L_Shoulder:
    # robot.xml limits; damping 6 → /4 = 1.5.
    limits_deg: { x: [-97.4, 97.4], y: [-108.86, 80.21], z: [-97.4, 85.94] }
    stiffness: 0
    damping: 1.5

  R_Shoulder:
    # robot.xml limits; damping /4 = 1.5.
    limits_deg: { x: [-97.4, 97.4], y: [-80.21, 108.86], z: [-85.94, 97.4] }
    stiffness: 0
    damping: 1.5

  L_Elbow:
    # robot.xml limits; damping 5 → /4 = 1.25.
    limits_deg: { x: [-17.19, 4.58], y: [-180, 17.19], z: [-100.84, 4.58] }
    stiffness: 0
    damping: 1.25

  R_Elbow:
    # robot.xml limits; damping /4 = 1.25.
    limits_deg: { x: [-17.19, 4.58], y: [-17.19, 180], z: [-4.58, 100.84] }
    stiffness: 0
    damping: 1.25

  L_Wrist:
    # robot.xml limits; no damping in robot → use 0.5.
    limits_deg: { x: [-180, 22.92], y: [-17.19, 17.19], z: [-22.92, 22.92] }
    stiffness: 0
    damping: 0.5

  R_Wrist:
    # robot.xml limits; no damping in robot → use 0.5.
    limits_deg: { x: [-180, 22.92], y: [-17.19, 17.19], z: [-22.92, 22.92] }
    stiffness: 0
    damping: 0.5

  L_Index1:
    # No ref in robot; reasonable MCP: flexion 0–90°, abduction ±20°, damping small.
    limits_deg: { x: [-5, 5], y: [-20, 20], z: [-90, 5] }
    stiffness: 0
    damping: 0.2

  L_Middle1:
    # No ref; reasonable MCP.
    limits_deg: { x: [-5, 5], y: [-20, 20], z: [-90, 5] }
    stiffness: 0
    damping: 0.2

  L_Pinky1:
    # No ref; reasonable MCP.
    limits_deg: { x: [-5, 5], y: [-30, 5], z: [-90, 5] }
    stiffness: 0
    damping: 0.2

  L_Ring1:
    # No ref; reasonable MCP.
    limits_deg: { x: [-5, 5], y: [-20, 20], z: [-90, 5] }
    stiffness: 0
    damping: 0.2

  L_Thumb1:
    # No ref; reasonable thumb CMC: wider range.
    limits_deg: { x: [-10, 5], y: [-5, 30], z: [-5, 5] }
    stiffness: 0
    damping: 0.2

  R_Index1:
    # No ref; reasonable MCP.
    limits_deg: { x: [-20, 20], y: [-20, 20], z: [-5, 90] }
    stiffness: 0
    damping: 0.2

  R_Middle1:
